name: Branch Policy

on:
  pull_request:
    branches: [main, develop]

jobs:
  check-branch-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch flow
        env:
          BASE: ${{ github.base_ref }}
          HEAD: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD → $BASE"

          if [ "$BASE" = "main" ] && [ "$HEAD" != "develop" ]; then
            echo "::error::PRs to main must come from develop (got $HEAD)"
            exit 1
          fi

          echo "Branch policy check passed"
